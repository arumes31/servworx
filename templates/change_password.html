<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.ico">
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #6b21a8, #a855f7);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: subtleGradient 10s ease-in-out infinite;
        }
        @keyframes subtleGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            background: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            color: #6b21a8;
            margin-bottom: 1.5rem;
        }
        .error {
            color: #dc2626;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        input[type="password"] {
            padding: 0.75rem;
            border: 1px solid #d8b4fe;
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="password"]:focus {
            border-color: #6b21a8;
        }
        input[type="submit"] {
            background: #6b21a8;
            color: #ffffff;
            padding: 0.75rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }
        input[type="submit"]:hover {
            background: #a855f7;
        }
        .footer {
            margin-top: 1.5rem;
            color: #6b21a8;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Premium Animated servworx SVG (Rotating Double-Star) -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" style="width: 80px; height: 80px; margin: 0 auto 1.25rem; display: block;">
          <defs>
            <filter id="glow">
              <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
              <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
            <linearGradient id="starGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#00F2FF;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#FF00E5;stop-opacity:1" />
            </linearGradient>
          </defs>
          <!-- Main Star -->
          <path d="M50 5 L58 42 L95 50 L58 58 L50 95 L42 58 L5 50 L42 42 Z" fill="url(#starGradient)" filter="url(#glow)">
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" repeatCount="indefinite" />
          </path>
          <!-- Secondary Points -->
          <path d="M50 25 L54 46 L75 50 L54 54 L50 75 L46 54 L25 50 L46 46 Z" fill="#FFFFFF" opacity="0.6" filter="url(#glow)">
            <animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="15s" repeatCount="indefinite" />
          </path>
        </svg>
        <h1>Change Password</h1>
        {{ if .error }}
            <div class="error">{{ .error }}</div>
        {{ end }}
        <form method="POST" action="/change_password">
            <label for="new_password">New Password:</label>
            <input type="password" id="new_password" name="new_password" required>
            <label for="confirm_password">Confirm Password:</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
            <input type="submit" value="Change Password">
        </form>
        <div class="footer">Powered by Servworx - Monitor Your Services with Ease</div>
    </div>
</body>
</html>
